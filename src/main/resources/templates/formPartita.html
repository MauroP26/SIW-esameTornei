<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Nuova Partita</title>
</head>

<body>

	<h1>Crea una nuova partita</h1>

	<form th:action="@{/admin/partite}" method="post">

		<label>Torneo</label>

		<select name="torneoId" required>
			<option th:each="torneo : ${tornei}" th:value="${torneo.id}" th:text="${torneo.nome}">
			</option>
		</select>

		<br><br>

		<label>Squadra di casa</label>

		<select name="squadraCasaId" required>
			<option th:each="squadra : ${squadre}" th:value="${squadra.id}" th:text="${squadra.nome}">
			</option>
		</select>

		<br><br>

		<label>Squadra ospite</label>

		<select name="squadraOspiteId" required>
			<option th:each="squadra : ${squadre}" th:value="${squadra.id}" th:text="${squadra.nome}">
			</option>
		</select>

		<br><br>

		<label>Arbitro</label>

		<select name="arbitroId" required>
			<option th:each="arbitro : ${arbitri}" th:value="${arbitro.id}"
				th:text="${arbitro.nome + ' ' + arbitro.cognome}">
			</option>
		</select>

		<br><br>

		<label>Luogo</label>

		<input type="text" name="luogo" required>

		<br><br>

		<label>Data e ora</label>

		<input type="datetime-local" name="dataOra" required>

		<br><br>

		<button type="submit">
			Crea partita
		</button>

	</form>

</body>

</html>
